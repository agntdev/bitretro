<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Lost in Hyperspace · BitRetro</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="css/fonts.css" />
  <link rel="stylesheet" href="css/tokens.css" />
  <link rel="stylesheet" href="css/animations.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/base.css" />
  <style>
    .err {
      min-height: 100vh;
      display: grid;
      place-content: center;
      text-align: center;
      gap: var(--space-5);
      padding: var(--container-pad);
    }
    .err__code {
      font-family: var(--font-display);
      font-size: var(--fs-hero);
      color: var(--color-neon-magenta);
      text-shadow: var(--glow-magenta);
      margin: 0;
    }
    .err__msg { color: var(--color-ink-muted); max-width: 46ch; margin-inline: auto; }
  </style>
</head>
<body>
  <main class="err">
    <p class="eyebrow">Signal lost</p>
    <h1 class="err__code glitch" data-text="404">404</h1>
    <p class="err__msg">This frequency is dead air. The page you were tuned to has drifted out of orbit.</p>
    <p><a class="btn btn--gold" href="./">← Back to BitRetro</a></p>
  </main>
</body>
</html>
